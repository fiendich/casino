{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="../static/css/index.css">

<div class="index-wrapper">
    <div class="header">
        <h1>Welcome to the Casino</h1>
            <p class="balance">
                {% if session.get("user_id") -%}
                    ${%- set val = balance|float -%}
                    {%- if val == val|int -%}
                        {{ val|int }}
                    {%- else -%}
                        {{ "%.2f"|format(val) }}
                    {%- endif -%}
                {%- endif %}
            </p>
    </div>
    

    <div class="game-grid">
        <a href="/blackjack" class="game-card" id="card-blackjack">
            <img src="../static/images/logo/blackjack.png">
        </a>

        <a href="/roulette" class="game-card" id="card-roulette">
            <img src="../static/images/logo/roulette.png">
        </a>

        <a href="/plinko" class="game-card" id="card-plinko">
            <img src="../static/images/logo/Plinko.png">
        </a>
    </div>
</div>
{% endblock %}
