{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="../static/css/blackjack.css">

<div class="bg"></div>

<span id="balance"></span>
    {% if session.get("user_id") -%}
        ${%- set val = balance|float -%}
        {%- if val == val|int -%}
            {{ val|int }}
        {%- else -%}
            {{ "%.2f"|format(val) }}
        {%- endif -%}
    {%- endif %}
</span>

<div id="gameArea">
    <!-- Dealer hand stays static in HTML -->
    <div id="dealerHand"></div>
    <div id="dealerValue">-</div>

    <!-- Player hand containers are created dynamically by JS.
         #playerHand / #playerValue no longer exist in markup. -->

    <div id="betContainer">
        <div id="inputContainer">
            <button id="inputHalf">1/2</button>
            <button id="inputDouble">2x</button>
            <button id="inputMax">Max</button>

            <span id="dollar">$</span>
            <input type="number" placeholder="100" id="bet" min="1" value="100"/>
        </div>

        {% if session.get("user_id") %}
        <button id="placeBetBtn">Place Bet</button>
        {% else %}
        <button id="loginToPlayBtn" onclick="openAuthModal('login')">Login to Play</button>
        {% endif %}
    </div>

    <div id="currentBetContainer">
        <p id="currentBet"></p>
    </div>

    <div id="buttons">
        <button id="hitBtn">Hit</button>
        <button id="standBtn">Stand</button>
        <button id="doubleBtn">Double</button>
        <button id="splitBtn">Split</button>
    </div>
</div>
<div id="toast-container"></div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/blackjack.js"></script>

{% endblock %}
